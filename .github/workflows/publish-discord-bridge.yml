# discord-bridge 이미지를 ghcr.io 에 푸시 (base: ghcr.io/openclaw/openclaw)
name: Publish discord-bridge
on:
  push:
    branches: [main]
    paths:
      - "discord-bridge/**"
      - ".github/workflows/publish-discord-bridge.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=discord-bridge
            type=raw,value=discord-bridge-${{ github.sha }}
            type=raw,value=discord-bridge-latest

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./discord-bridge
          file: ./discord-bridge/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
